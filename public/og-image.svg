<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Blackout Open Graph Image</title>
  <desc id="desc">Blackout wordmark on dark background with green accent lock.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050708" />
      <stop offset="100%" stop-color="#0a0e0f" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="140" cy="315" r="64" fill="none" stroke="#00ff88" stroke-width="8"/>
  <circle cx="140" cy="315" r="16" fill="#00ff88"/>
  <text x="250" y="305" fill="#00ff88" font-size="112" font-family="Inter, Arial, sans-serif" font-weight="700" letter-spacing="5">BLACKOUT</text>
  <text x="252" y="380" fill="#c5cec7" font-size="40" font-family="Inter, Arial, sans-serif">Communication that stays yours</text>
</svg>
